<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Pilot - Super TMA</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #ffffff;
            --text-hint: #8e8e93;
            --accent-blue: #2f80ed;
            --accent-green: #34c759;
            --accent-red: #ff3b30;
            --border-color: #2c2c35;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px; padding-bottom: 90px;
        }
        .header h1 { font-size: 26px; margin: 0 0 10px 0; font-weight: 700; }
        .stats-badge { background: #24242b; border: 1px solid var(--border-color); padding: 6px 12px; border-radius: 12px; font-size: 12px; color: var(--accent-blue); display: inline-block; margin-bottom: 15px; font-weight: bold; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { background: #24242b; border: none; padding: 10px 16px; border-radius: 20px; color: var(--text-hint); font-weight: 600; font-size: 14px; cursor: pointer; flex: 1; text-align: center; }
        .tab.active { background: var(--accent-blue); color: #fff; }
        .quiz-card { background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 14px; border: 1px solid var(--border-color); }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-title { font-size: 18px; font-weight: 700; margin: 0 0 6px 0; }
        .screen { display: none; }
        .screen.active { display: block; }
        .upload-box { border: 2px dashed var(--border-color); border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; background: var(--card-bg); margin-bottom: 20px; color: var(--text-hint); }
        .input-text { width: 100%; box-sizing: border-box; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 15px; color: #fff; font-size: 15px; resize: vertical; margin-bottom: 20px; }
        .submit-btn { background: var(--accent-blue); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #16161a; display: flex; justify-content: space-around; border-top: 1px solid var(--border-color); align-items: center; z-index: 99; }
        .nav-item { display: flex; flex-direction: column; align-items: center; background: none; border: none; font-size: 11px; color: var(--text-hint); cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        .loader { display: none; text-align: center; padding: 20px; font-size: 16px; color: var(--accent-blue); font-weight: bold; }
    </style>
</head>
<body>

    <!-- YARATISH EKRANI -->
    <div id="create-screen" class="screen">
        <div class="header"><h1>Yangi Test Yaratish</h1></div>
        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <span style="font-size: 40px; display: block; margin-bottom: 10px;">📂</span>
            <span id="upload-text">Darslik yuklash (PDF yoki DOCX)</span>
            <input type="file" id="file-input" accept=".pdf,.docx" style="display: none;" onchange="fileSelected(this)">
        </div>
        <div style="text-align: center; color: var(--text-hint); margin-bottom: 20px;">yoki matn kiriting:</div>
        <textarea id="text-input" class="input-text" rows="6" placeholder="Mavzu yoki konspekt matnini joylang..."></textarea>
        <button id="generate-btn" class="submit-btn" onclick="startGeneration()">AI yordamida yaratish 🚀</button>
        <div id="loading-status" class="loader">⏳ AI test tayyorlamoqda, iltimos kuting...</div>
    </div>

    <!-- KUTUBXONA EKRANI -->
    <div id="library-screen" class="screen active">
        <div class="header"><h1>Kutubxona</h1></div>
        <div id="user-stats-badge" class="stats-badge">👥 Tizimda: ... foydalanuvchi</div>
        <div class="tabs">
            <button class="tab active">Testlar</button>
            <button class="tab">Ommaviy</button>
            <button class="tab">Kartochkalar</button>
        </div>
        <div id="quiz-list">
            <div style="text-align: center; color: var(--text-hint); padding: 40px;">Yuklanmoqda...</div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <button id="nav-create" class="nav-item" onclick="switchScreen('create')"><span class="nav-icon">➕</span><span>Yaratish</span></button>
        <button id="nav-library" class="nav-item active" onclick="switchScreen('library')"><span class="nav-icon">📚</span><span>Kutubxona</span></button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let userId = 99999;
        if (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) {
            userId = tg.initDataUnsafe.user.id;
        }

        function switchScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            if(screen === 'create') {
                document.getElementById('create-screen').classList.add('active');
                document.getElementById('nav-create').classList.add('active');
            } else {
                document.getElementById('library-screen').classList.add('active');
                document.getElementById('nav-library').classList.add('active');
                loadQuizzes();
                loadGlobalStats();
            }
        }

        function fileSelected(input) {
            if(input.files && input.files.length > 0) {
                document.getElementById('upload-text').innerText = "Tanlandi: " + input.files[0].name;
            }
        }

        async function loadGlobalStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                if (data && data.status === "ok") {
                    document.getElementById('user-stats-badge').innerText = `👥 Tizimda: ${data.total_users} foydalanuvchi`;
                }
            } catch (e) { 
                console.log("Statistika xatosi:", e); 
            }
        }

        async function loadQuizzes() {
            try {
                const response = await fetch(`/api/quizzes?user_id=${userId}`);
                const data = await response.json();
                const container = document.getElementById('quiz-list');
                
                if (!container) return;
                container.innerHTML = "";
                
                if (data && data.status === "ok" && data.quizzes && data.quizzes.length > 0) {
                    data.quizzes.forEach(quiz => {
                        const card = document.createElement('div');
                        card.className = "quiz-card";
                        card.innerHTML = `<div class="card-top"><div class="card-title">${quiz.title}</div></div>`;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<div style="text-align: center; color: var(--text-hint); padding: 40px;">Sizda hali testlar yo'q. "Yaratish" bo'limidan yangi test qo'shing!</div>`;
                }
            } catch(e) {
                document.getElementById('quiz-list').innerHTML = `<div style="text-align: center; color: var(--accent-red); padding: 40px;">Ulanishda xatolik yuz berdi.</div>`;
            }
        }

        async function startGeneration() {
            const textInput = document.getElementById('text-input');
            const fileInput = document.getElementById('file-input');
            
            const textValue = textInput ? textInput.value.trim() : "";
            const hasFile = fileInput && fileInput.files && fileInput.files.length > 0;
            
            if(!textValue && !hasFile) {
                alert("Matn kiriting yoki fayl yuklang!");
                return;
            }
            
            document.getElementById('generate-btn').style.display = 'none';
            document.getElementById('loading-status').style.display = 'block';
            
            const formData = new FormData();
            formData.append('user_id', userId);
            if(textValue) formData.append('text', textValue);
            if(hasFile) formData.append('file', fileInput.files[0]);
            
            try {
                const response = await fetch('/api/create-quiz-web', { method: 'POST', body: formData });
                const data = await response.json();
                if(data && data.status === 'ok') {
                    alert("Test muvaffaqiyatli yaratildi!");
                    if(textInput) textInput.value = "";
                    if(fileInput) fileInput.value = "";
                    document.getElementById('upload-text').innerText = "Darslik yuklash (PDF yoki DOCX)";
                    switchScreen('library');
                } else {
                    alert("Xato: " + (data ? data.message : "Noma'lum xatolik"));
                }
            } catch(e) {
                alert("Server bilan aloqa uzildi.");
            } finally {
                document.getElementById('generate-btn').style.display = 'block';
