<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Pilot - Super TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #ffffff;
            --text-hint: #8e8e93;
            --accent-blue: #2f80ed;
            --accent-green: #34c759;
            --accent-red: #ff3b30;
            --border-color: #2c2c35;
            --accent-yellow: #f2c94c;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 15px; padding-bottom: 90px;
            -webkit-user-select: none; user-select: none;
        }
        .header h1 { font-size: 26px; margin: 0 0 15px 0; font-weight: 700; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { background: #24242b; border: none; padding: 10px 16px; border-radius: 20px; color: var(--text-hint); font-weight: 600; font-size: 14px; cursor: pointer; flex: 1; text-align: center; }
        .tab.active { background: var(--accent-blue); color: #fff; }
        .quiz-card { background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 14px; border: 1px solid var(--border-color); }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-title { font-size: 18px; font-weight: 700; margin: 0 0 6px 0; max-width: 65%; }
        .action-group { display: flex; gap: 8px; }
        .btn-circle { background: #24242b; border: none; border-radius: 12px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; color: #fff; }
        .progress-row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .progress-line-container { background: #2c2c35; border-radius: 6px; height: 6px; flex: 1; margin-right: 15px; overflow: hidden; }
        .progress-line-bar { height: 100%; border-radius: 6px; transition: width 0.3s; background: var(--accent-blue); }
        .card-footer { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-hint); margin-top: 8px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .upload-box { border: 2px dashed var(--border-color); border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; background: var(--card-bg); margin-bottom: 20px; color: var(--text-hint); }
        .input-text { width: 100%; box-sizing: border-box; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 15px; color: #fff; font-size: 15px; resize: vertical; margin-bottom: 20px; }
        .submit-btn { background: var(--accent-blue); color: #fff; border: none; width: 100%; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #game-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-color); z-index: 1000; padding: 20px; display: none; overflow-y: auto; }
        .game-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 30px; }
        .q-text { font-size: 20px; font-weight: 700; margin-bottom: 25px; line-height: 1.4; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 16px; border-radius: 14px; text-align: left; font-size: 16px; color: #fff; cursor: pointer; }
        .opt-btn.correct { background: var(--accent-green) !important; border-color: var(--accent-green); }
        .opt-btn.wrong { background: var(--accent-red) !important; border-color: var(--accent-red); }
        .explanation-box { background: #24242b; border-radius: 12px; padding: 14px; margin-top: 20px; font-size: 14px; border-left: 4px solid var(--accent-red); display: none; }
        .next-btn { background: var(--accent-blue); color: white; border: none; padding: 15px; border-radius: 14px; font-size: 16px; font-weight: bold; width: 100%; margin-top: 25px; cursor: pointer; display: none; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #16161a; display: flex; justify-content: space-around; border-top: 1px solid var(--border-color); align-items: center; z-index: 99; }
        .nav-item { display: flex; flex-direction: column; align-items: center; background: none; border: none; font-size: 11px; color: var(--text-hint); cursor: pointer; }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item.active#nav-create .nav-icon { color: var(--accent-yellow) !important; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; color: var(--text-hint); }
        .loader { display: none; text-align: center; padding: 20px; font-size: 16px; color: var(--accent-blue); font-weight: bold; }
    </style>
</head>
<body>

    <!-- YARATISH -->
    <div id="create-screen" class="screen">
        <div class="header"><h1>Yangi Test Yaratish</h1></div>
        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <span style="font-size: 40px; display: block; margin-bottom: 10px;">📂</span>
            <span id="upload-text">Darslik yuklash (PDF yoki DOCX)</span>
            <input type="file" id="file-input" accept=".pdf,.docx" style="display: none;" onchange="fileSelected(this)">
        </div>
        <div style="text-align: center; color: var(--text-hint); margin-bottom: 20px;">yoki matn kiriting:</div>
        <textarea id="text-input" class="input-text" rows="6" placeholder="Mavzu yoki konspekt matnini joylang..."></textarea>
        <button id="generate-btn" class="submit-btn" onclick="startGeneration()">AI yordamida yaratish 🚀</button>
        <div id="loading-status" class="loader">⏳ AI test tayyorlamoqda, iltimos kuting...</div>
    </div>

    <!-- KUTUBXONA -->
    <div id="library-screen" class="screen active">
        <div class="header"><h1>Kutubxona</h1></div>
        <div class="tabs">
            <button class="tab active">❓ Testlar</button>
            <button class="tab" onclick="alert('Tez kunda ommaviy bo\'lim ishga tushadi!')">🌐 Ommaviy</button>
            <button class="tab" onclick="alert('Tez kunda flesh-kartochkalar qo\'shiladi!')">🗂️ Kartochkalar</button>
        </div>
        <div id="quiz-list">
            <div style="text-align: center; color: var(--text-hint); padding: 40px;">Sizda hali testlar yo'q. "Yaratish" bo'limidan yangi test qo'shing!</div>
        </div>
    </div>

    <!-- PLAY GAME -->
    <div id="game-screen">
        <div class="game-header">
            <span id="game-title">Test</span>
            <span style="color: var(--accent-red); cursor: pointer;" onclick="closeGame()">✖ Chiqish</span>
        </div>
        <div id="game-progress" style="font-size: 14px; color: var(--text-hint); margin-bottom: 10px;">Savol: 1/10</div>
        <div class="q-text" id="question-text">Savol yuklanmoqda...</div>
        <div class="options-list" id="options-container"></div>
        <div class="explanation-box" id="explanation-container"></div>
        <button class="next-btn" id="next-question-btn" onclick="nextQuestion()">Keyingi savol ➡️</button>
    </div>

    <div class="bottom-nav">
        <button id="nav-create" class="nav-item" onclick="document.getElementById('library-screen').classList.remove('active'); document.getElementById('create-screen').classList.add('active'); document.getElementById('nav-library').classList.remove('active'); this.classList.add('active');"><span class="nav-icon">➕</span><span>Yaratish</span></button>
        <button id="nav-library" class="nav-item active" onclick="document.getElementById('create-screen').classList.remove('active'); document.getElementById('library-screen').classList.add('active'); document.getElementById('nav-create').classList.remove('active'); this.classList.add('active'); loadQuizzes();"><span class="nav-icon">📚</span><span>Kutubxona</span></button>
        <button class="nav-item" onclick="alert('Sozlamalar tez kunda qo\'shiladi!')"><span class="nav-icon">⚙️</span><span>Sozlamalar</span></button>
        <button class="nav-item" onclick="alert('Premium rejim tez kunda ochiladi!')"><span class="nav-icon">👑</span><span>Premium</span></button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#121214');

        const BASE_URL = window.location.origin;

        let userId = 99999; 
        if (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) {
            userId = tg.initDataUnsafe.user.id;
        }

        let currentQuizQuestions = [];
        let currentQuestionIdx = 0;
        let currentQuizId = "";
        let isAnswered = false;

        let correctAnswersCount = 0;
        let wrongAnswersCount = 0;

        function fileSelected(input) {
            if(input.files && input.files.length > 0) {
                document.getElementById('upload-text').innerText = "Tanlandi: " + input.files[0].name;
            }
        }

        async function startGeneration() {
            const textInput = document.getElementById('text-input').value.trim();
            const fileInput = document.getElementById('file-input');
            const genBtn = document.getElementById('generate-btn');
            const loader = document.getElementById('loading-status');

            if (!textInput && fileInput.files.length === 0) {
                alert("Iltimos, matn kiriting yoki darslik faylini yuklang!");
                return;
            }

            genBtn.style.display = "none";
            loader.style.display = "block";

            const formData = new FormData();
            formData.append('user_id', userId);
            if (textInput) formData.append('text', textInput);
            if (fileInput.files.length > 0) formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch(BASE_URL + '/api/create-quiz-web', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data && data.status === "ok") {
                    alert("🎉 Test muvaffaqiyatli yaratildi!");
                    document.getElementById('text-input').value = "";
                    fileInput.value = "";
                    document.getElementById('upload-text').innerText = "Darslik yuklash (PDF yoki DOCX)";
                    
                    document.getElementById('create-screen').classList.remove('active');
                    document.getElementById('library-screen').classList.add('active');
                    document.getElementById('nav-create').classList.remove('active');
                    document.getElementById('nav-library').classList.add('active');
                    loadQuizzes();
                } else {
                    alert("Xato: " + (data.message || "Test yaratib bo'lmadi."));
                }
            } catch (error) {
                console.error(error);
                alert("Tizimda xatolik yuz berdi. Backend ulanishini tekshiring.");
            } finally {
                genBtn.style.display = "block";
                loader.style.display = "none";
            }
        }

        async function loadQuizzes() {
            try {
                const response = await fetch(BASE_URL + '/api/quizzes?user_id=' + userId + '&_t=' + Date.now());
                const data = await response.json();
                const container = document.getElementById('quiz-list');
                if (!container) return;
                container.innerHTML = "";
                
                if (data && data.status === "ok" && data.quizzes && data.quizzes.length > 0) {
                    data.quizzes.forEach(quiz => {
                        const percent = quiz.total > 0 ? Math.round((quiz.answered / quiz.total) * 100) : 0;
                        const card = document.createElement('div');
                        card.className = 'quiz-card';
                        card.innerHTML = `
                            <div class="card-top">
                                <div class="card-title">${quiz.title}</div>
                                <div class="action-group">
                                    <button class="btn-circle" onclick="playQuiz('${quiz.id}')">▶️</button>
                                </div>
                            </div>
                            <div class="progress-row">
                                <div class="progress-line-container">
                                    <div class="progress-line-bar" style="width: ${percent}%;"></div>
                                </div>
                                <span style="font-size: 14px; font-weight: bold;">${percent}%</span>
                            </div>
                            <div class="card-footer">
                                <span>Savollar: ${quiz.total} ta</span>
                                <span>Faol</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<div style="text-align: center; color: var(--text-hint); padding: 40px;">Sizda hali testlar yo'q. "Yaratish" bo'limidan yangi test qo'shing!</div>`;
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function playQuiz(quizId) {
            try {
                const response = await fetch(BASE_URL + '/api/quiz-detail?quiz_id=' + quizId);
                const data = await response.json();
                if (data && data.status === "ok" && data.quiz_json && data.quiz_json.quizzes) {
                    currentQuizId = quizId;
                    currentQuizQuestions = data.quiz_json.quizzes;
                    currentQuestionIdx = 0;
                    
                    correctAnswersCount = 0;
                    wrongAnswersCount = 0;

                    document.getElementById('game-screen').style.display = 'block';
                    showQuestion();
                } else {
                    alert("Test ma'lumotlarini yuklab bo'lmadi.");
                }
            } catch (error) {
                alert("Xato yuz berdi.");
            }
        }

        function showQuestion() {
            if (currentQuestionIdx >= currentQuizQuestions.length) {
                finishQuiz();
                return;
            }
            isAnswered = false;
            const q = currentQuizQuestions[currentQuestionIdx];
            document.getElementById('game-progress').innerText = `Savol: ${currentQuestionIdx + 1}/${currentQuizQuestions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            document.getElementById('explanation-container').style.display = 'none';
            document.getElementById('next-question-btn').style.display = 'none';

            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => selectOption(btn, idx, q.correct_index, q.explanation);
                container.appendChild(btn);
            });
        }

        function selectOption(btn, idx, correctIdx, explanation) {
            if (isAnswered) return;
            isAnswered = true;
            
            const container = document.getElementById('options-container');
            const buttons = container.getElementsByClassName('opt-btn');
            const expBox = document.getElementById('explanation-container');

            if (idx === correctIdx) {
                btn.classList.add('correct');
                correctAnswersCount++;
                expBox.style.display = 'none'; // To'g'ri bo'lsa izoh yashiriladi
            } else {
                btn.classList.add('wrong');
                wrongAnswersCount++;
                if (buttons[correctIdx]) {
                    buttons[correctIdx].classList.add('correct');
                }
                // Noto'g'ri bo'lsa izoh ko'rsatiladi
                expBox.innerText = "💡 Izoh: " + (explanation || "Bu variant xato. To'g'ri javob belgilandi.");
                expBox.style.display = 'block';
            }

            document.getElementById('next-question-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIdx++;
            showQuestion();
        }

        async function finishQuiz() {
            try {
                // Qayta o'ynash uchun progressni yangilash so'rovini yuboramiz
                await fetch(BASE_URL + '/api/update-progress', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quiz_id: currentQuizId, user_id: userId })
                });
            } catch (e) {}
            
            const total = currentQuizQuestions.length;
            const scorePercent = Math.round((correctAnswersCount / total) * 100);
            
            alert(
                `🏁 Test yakunlandi!\n\n` +
                `📊 Umumiy savollar: ${total} ta\n` +
                `✅ To'g'ri javoblar: ${correctAnswersCount} ta\n` +
                `❌ Noto'g'ri javoblar: ${wrongAnswersCount} ta\n` +
                `🎯 Natija: ${scorePercent}%`
            );
            
            closeGame();
        }

        function closeGame() {
            document.getElementById('game-screen').style.display = 'none';
            loadQuizzes();
        }

        window.onload = function() {
            loadQuizzes();
        };
    </script>
</body>
</html>
