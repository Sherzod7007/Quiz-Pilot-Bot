<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biz Quiz Pilot</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org"></script>
    <!-- Telefonda xatoliklarni tekshirish (Console) uchun Eruda debug vositasi -->
    <script src="https://jsdelivr.net"></script>
    <script>eruda.init();</script>
    
    <style>
        /* SIZNING ASLIY ORIGINAL CHIROYLI DIZAYNINGIZ VA BARCHA STILLARINGIZ (Hamma funksiya saqlangan) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 90px;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        
        /* Navigatsiya stillari va Faol "+" tugmasini sariq qiluvchi CSS */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background-color: #151a24;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222b3c;
            z-index: 1000;
        }
        .nav-item {
            background: none;
            border: none;
            color: #8e929a;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            transition: color 0.2s;
        }
        .nav-item.active {
            color: #3b82f6;
        }
        /* Maxsus talabingiz bo'yicha: pastdagi navigatsiyada faqat faol "+" ikonkasini sariq qiladigan CSS */
        .nav-item.plus-btn.active {
            color: #eab308 !important; /* To'q sariq / Yellow rang */
        }
        
        /* Elementlar va Tugmalar stillari */
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 120px;
            background-color: #151a24;
            border: 1px solid #222b3c;
            border-radius: 12px;
            color: white;
            padding: 12px;
            font-size: 16px;
            resize: none;
        }
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .file-upload-box {
            border: 2px dashed #222b3c;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            background-color: #151a24;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .file-upload-box input {
            display: none;
        }
        .main-btn {
            width: 100%;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .main-btn:disabled {
            background-color: #1d2433;
            color: #6b7280;
            cursor: not-allowed;
        }
        
        /* Kvizlar va o'yin ekranlari dizayni */
        .quiz-card {
            background-color: #151a24;
            border: 1px solid #222b3c;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .quiz-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .quiz-meta {
            color: #9ca3af;
            font-size: 14px;
        }
        .option-btn {
            width: 100%;
            background-color: #151a24;
            border: 1px solid #222b3c;
            border-radius: 12px;
            padding: 14px;
            color: white;
            text-align: left;
            margin-bottom: 10px;
            font-size: 15px;
            cursor: pointer;
        }
        .option-btn.correct { background-color: #10b981; border-color: #10b981; }
        .option-btn.wrong { background-color: #ef4444; border-color: #ef4444; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- 1-EKRAN: ASOSIY O'YIN RO'YXATI (HOME) -->
        <div id="screen-home" class="screen active">
            <h2 style="margin-bottom: 20px;">Mening Kvizlarim</h2>
            <div id="quizzes-list">
                <!-- Kvizlar ro'yxati JS orqali yuklanadi -->
                <p style="color: #9ca3af;">Yuklanmoqda...</p>
            </div>
        </div>

        <!-- 2-EKRAN: AI YORDAMIDA YANGI KVIZ YARATISH (YANGI/PLUS SAHIFA) -->
        <div id="screen-create" class="screen">
            <h2 style="margin-bottom: 20px;">AI Kviz Yaratish</h2>
            
            <form id="quiz-generation-form">
                <div class="input-group">
                    <label for="quiz-text">Mavzu yoki darslik matnini kiriting:</label>
                    <textarea id="quiz-text" placeholder="Bu yerga test olmoqchi bo'lgan ma'lumotlaringizni yozing yoki nusxalab joylashtiring..."></textarea>
                </div>
                
                <div class="file-upload-box" onclick="document.getElementById('quiz-file').click()">
                    <span id="file-status-text">📁 PDF yoki DOCX darslik yuklash</span>
                    <input type="file" id="quiz-file" accept=".pdf,.docx">
                </div>

                <!-- MUAMMO BO'LGAN ASOSIY TUGMA -->
                <button type="button" id="generate-ai-btn" class="main-btn">AI yordamida yaratish</button>
            </form>
        </div>

        <!-- 3-EKRAN: AKTIV SAVOL-JAVOB PLAY EKRANI -->
        <div id="screen-play" class="screen">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <button onclick="switchScreen('screen-home')" style="background: none; border: none; color: #3b82f6; font-size: 16px; cursor: pointer;">⬅ Chiqish</button>
                <span id="progress-text" style="color: #9ca3af;">0/0</span>
            </div>
            <h3 id="question-text" style="margin-bottom: 20px; line-height: 1.5;">Savol matni yuklanmoqda...</h3>
            <div id="options-container">
                <!-- Variantlar tugmalari dinamik chiqadi -->
            </div>
            <div id="explanation-box" style="margin-top: 20px; padding: 12px; background-color: #1e293b; border-radius: 8px; display: none; color: #cbd5e1; font-size: 14px;">
            </div>
        </div>

    </div>

    <!-- PASTDAGI NAVIGATSIYA PANELINGIZ -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchScreen('screen-home', this)">
            <span>🏠</span>
        </button>
        <!-- Faol bo'lganda sariq rangga kiruvchi maxsus classga ega o'rtadagi "+" tugmasi -->
        <button class="nav-item plus-btn" onclick="switchScreen('screen-create', this)">
            <span>➕</span>
        </button>
    </nav>

    <script>
        // Telegram WebApp sozlamalari
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // Foydalanuvchi ID sini aniqlash (Telegramdan yoki sinov uchun test ID)
        const tgUser = tg?.initDataUnsafe?.user;
        const USER_ID = tgUser ? tgUser.id : 123456789;

        // Ekranlarni almashtirish funksiyasi
        function switchScreen(screenId, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (element) {
                document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
                element.classList.add('active');
            }
            
            if (screenId === 'screen-home') {
                loadUserQuizzes();
            }
        }

        // Fayl tanlanganini vizual ko'rsatish
        document.getElementById('quiz-file').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                document.getElementById('file-status-text').innerText = `✅ Tanlandi: ${fileName}`;
            }
        });

        // ==========================================
        // SIZ QIDIRGAN ASOSIY INTEGRATSIYA VA MUAMMO YECHIMI:
        // ==========================================
        document.getElementById('generate-ai-btn').addEventListener('click', async function(e) {
            e.preventDefault();
            
            const textInput = document.getElementById('quiz-text').value.trim();
            const fileInput = document.getElementById('quiz-file').files[0];

            if (!textInput && !fileInput) {
                alert("Iltimos, matn kiriting yoki darslik faylini yuklang!");
                return;
            }

            // Tugma holatini o'zgartiramiz
            const originalText = this.innerHTML;
            this.disabled = true;
            this.innerHTML = 'AI ishlamoqda, kuting... ⏳';
